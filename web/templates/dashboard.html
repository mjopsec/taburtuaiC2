<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .title }} — C2 Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Stylesheets (order matters) -->
  <link rel="stylesheet" href="/static/css/variables.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">

  <meta name="theme-color" content="#0d1117">
</head>

<body>
<div class="app-shell">

  <!-- ══════════════════════════════════════════
       SIDEBAR
       ══════════════════════════════════════════ -->
  <aside class="sidebar" role="navigation" aria-label="Main navigation">

    <!-- Brand -->
    <a class="sidebar-brand" href="#overview">
      <div class="sidebar-brand-icon">⚔</div>
      <div class="sidebar-brand-text">
        <span class="sidebar-brand-name">TABURTUAI</span>
        <span class="sidebar-brand-tag">C2 Framework</span>
      </div>
    </a>

    <!-- Navigation -->
    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-label">Operations</div>

        <div class="nav-item active" data-page="overview" role="button" tabindex="0">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
            <path d="M1 2.75A.75.75 0 011.75 2h4.5a.75.75 0 010 1.5H2.5v4.75a.75.75 0 01-1.5 0V2.75zM8.75 2a.75.75 0 000 1.5h4.75v4.75a.75.75 0 001.5 0V2.75A.75.75 0 0014.25 2h-5.5zM1 8.75a.75.75 0 011.5 0v4.75h4.75a.75.75 0 010 1.5H1.75A.75.75 0 011 14.25v-5.5zM14.25 8a.75.75 0 01.75.75v5.5a.75.75 0 01-.75.75h-5.5a.75.75 0 010-1.5h4.75V8.75a.75.75 0 01.75-.75z"/>
          </svg>
          Overview
        </div>

        <div class="nav-item" data-page="agents" role="button" tabindex="0">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0a8 8 0 110 16A8 8 0 018 0zm0 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zm0 2a2 2 0 110 4 2 2 0 010-4zm0 5.5c2.07 0 3.76.695 4.583 1.794A5.496 5.496 0 018 13.5a5.496 5.496 0 01-4.583-2.206C4.24 10.195 5.93 9.5 8 9.5z"/>
          </svg>
          Agents
          <span class="nav-badge" style="display:none">0</span>
        </div>

        <div class="nav-item" data-page="commands" role="button" tabindex="0">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
            <path d="M0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0114.25 15H1.75A1.75 1.75 0 010 13.25V2.75zm1.75-.25a.25.25 0 00-.25.25V4h13V2.75a.25.25 0 00-.25-.25H1.75zM1.5 5.5v7.75c0 .138.112.25.25.25h12.5a.25.25 0 00.25-.25V5.5H1.5zm4.03 2.72a.75.75 0 010 1.06l-1.5 1.5a.75.75 0 010-1.06l1.5-1.5a.75.75 0 011.06 0zM8.5 10a.75.75 0 01.75-.75h2a.75.75 0 010 1.5h-2A.75.75 0 018.5 10z"/>
          </svg>
          Commands
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-label">Intelligence</div>

        <div class="nav-item" data-page="logs" role="button" tabindex="0">
          <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor">
            <path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v9.5A1.75 1.75 0 0114.25 13H8.06l-2.573 2.573A1.457 1.457 0 013 14.543V13H1.75A1.75 1.75 0 010 11.25v-9.5zm1.75-.25a.25.25 0 00-.25.25v9.5c0 .138.112.25.25.25h2a.75.75 0 01.75.75v2.19l2.72-2.72a.749.749 0 01.53-.22h6.5a.25.25 0 00.25-.25v-9.5a.25.25 0 00-.25-.25H1.75z"/>
          </svg>
          Logs
        </div>
      </div>
    </nav>

    <!-- Server status footer -->
    <div class="sidebar-footer">
      <div class="server-status">
        <div class="status-dot"></div>
        <div class="status-info">
          <div class="status-label">Connecting…</div>
          <div class="status-value">v{{ .version }}</div>
        </div>
      </div>
    </div>

  </aside><!-- /sidebar -->

  <!-- ══════════════════════════════════════════
       MAIN CONTENT
       ══════════════════════════════════════════ -->
  <div class="main-content">

    <!-- Topbar -->
    <header class="topbar">
      <span class="topbar-title" id="topbar-title">Overview</span>
      <div class="topbar-actions">
        <span class="topbar-clock" id="topbar-clock" aria-label="Server time">--:--:--</span>
      </div>
    </header>

    <!-- Pages — each rendered lazily by app.js -->
    <main>
      <div id="page-overview" class="page active"></div>
      <div id="page-agents"   class="page"></div>
      <div id="page-commands" class="page"></div>
      <div id="page-logs"     class="page"></div>
    </main>

  </div><!-- /main-content -->

</div><!-- /app-shell -->

<!-- Toast container injected by ui.js -->

<!-- Scripts — dependency order -->
<script src="/static/js/api.js"></script>
<script src="/static/js/ui.js"></script>
<script src="/static/js/pages/overview.js"></script>
<script src="/static/js/pages/agents.js"></script>
<script src="/static/js/pages/commands.js"></script>
<script src="/static/js/pages/logs.js"></script>
<script src="/static/js/app.js"></script>

</body>
</html>
