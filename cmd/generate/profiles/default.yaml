# Default profile — fast beacon, no evasion (safe for lab/VM environments)
# Recommended shell timeout: --timeout 60
name: default
sleep_interval: 10s
jitter_percent: 20
max_retries: 5
enable_sandbox_check: false
enable_vm_check: false
enable_debug_check: false
sleep_masking: false
user_agent_rotation: false
kill_date: ""
working_hours_only: false

# Level 1 evasion
exec_method: cmd            # direct cmd.exe — no obfuscation, fastest
obfuscate: false
masquerade:
  enabled: false
